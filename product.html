        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #fff;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* 统一导航栏样式 - 和 index.html 完全一致 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 16px 20px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9999;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo {
            height: 32px;
            width: auto;
            transition: all 0.4s ease;
        }
        .nav-menu {
            display: flex;
            gap: 16px;
            list-style: none;
        }
        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }
        .nav-menu a:hover {
            color: #FF7D00;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 130px 24px 60px;
        }

        .filter-container {
            background: #0F0F0F;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 48px;
            border: 1px solid rgba(255,125,0,0.2);
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .filter-item {
            flex: 1;
            min-width: 170px;
            position: relative;
        }

        .filter-item select {
            width: 100%;
            padding: 14px 18px;
            background: #1A1A1A;
            border: 1px solid #2C2C2C;
            color: white;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s ease;
        }

        .filter-item select:focus {
            outline: none;
            border-color: #FF7D00;
        }

        .filter-item i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #FF7D00;
            pointer-events: none;
        }

        .search-btn {
            padding: 14px 32px;
            background: #FF7D00;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: #e66f00;
            transform: scale(0.97);
        }

        .intro-section {
            text-align: center;
            margin-bottom: 48px;
        }

        .intro-section h1 {
            font-size: clamp(24px, 4vw, 38px);
            font-weight: 800;
            color: #FF7D00;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .intro-section p {
            color: #aaa;
            max-width: 700px;
            margin: 0 auto;
            font-size: 15px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 28px;
        }

        .product-card {
            background: #111;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            overflow: hidden;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #FF7D00;
            box-shadow: 0 8px 24px rgba(255,125,0,0.1);
        }

        .product-img-container {
            position: relative;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #FF7D00;
            color: #000;
            font-weight: 800;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .product-info {
            padding: 20px;
            height: calc(100% - 225px);
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.4;
            flex: 1;
        }

        .product-desc {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .product-part {
            font-family: monospace;
            background: #1e1e1e;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #FF9A44;
            align-self: flex-start;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: #111;
            border-radius: 28px;
            color: #aaa;
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .no-results i {
            color: #FF7D00;
            margin-bottom: 12px;
            font-size: 24px;
        }

        .footer {
            background: #050000;
            padding: 48px 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            margin-top: 80px;
            border-top: 1px solid rgba(255,125,0,0.15);
        }

        .footer h4 {
            color: #FF7D00;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .social-icons a {
            color: white;
            font-size: 22px;
            margin: 0 10px;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .social-icons a:hover {
            color: #FF7D00;
            transform: translateY(-2px);
        }

        @media (min-width: 768px) {
            .navbar {
                padding: 16px 12px;
            }
            .logo {
                height: 40px;
            }
            .nav-menu {
                gap: 12px;
            }
            .nav-menu a {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }

            .search-btn {
                width: 100%;
            }

            .nav-menu {
                gap: 16px;
            }

            .footer {
                flex-direction: column;
                text-align: center;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 12px 16px;
            }

            .nav-menu {
                gap: 12px;
            }

            .nav-menu a {
                font-size: 12px;
            }
        }

// ===================== 工具函数 =====================
function extractYearRange(desc) {
    const yearMatch = desc.match(/(\d{2,4})\s*[-–]\s*(\d{2,4})/);
    if (yearMatch) return `${yearMatch[1]}-${yearMatch[2]}`;
    
    const singleYear = desc.match(/(19|20)\d{2}/);
    if (singleYear) return singleYear[0];
    
    if (desc.includes("20+") || desc.includes("up") || desc.includes("+")) return "2020+";
    if (desc.includes("19+")) return "2019+";
    return "—";
}

// 数据处理（修复车型重复显示）
const productsData = rawData.map(item => {
    let shortModel = item.app
        .replace(new RegExp(item.brand, 'gi'), '')
        .split(/[,\d\(]/)[0]
        .trim();
    
    if (shortModel.length > 38) shortModel = shortModel.substring(0, 35);
    shortModel = shortModel || item.brand;
    
    return {
        make: item.brand,
        model: shortModel,
        year: extractYearRange(item.app),
        part: item.part,
        application: item.app
    };
});

// 去重
const uniqueProducts = [];
const keySet = new Set();
for (let p of productsData) {
    const uid = `${p.make}|${p.model}|${p.part}`;
    if (!keySet.has(uid)) {
        keySet.add(uid);
        uniqueProducts.push(p);
    }
}
const finalData = uniqueProducts;

// ===================== DOM 元素 =====================
const makeSel = document.getElementById("makeSelect");
const modelSel = document.getElementById("modelSelect");
const yearSel = document.getElementById("yearSelect");
const searchBtn = document.getElementById("searchBtn");
const productGrid = document.getElementById("productList");

// ===================== 核心功能 =====================
function populateMakes() {
    const makes = [...new Set(finalData.map(p => p.make))].sort();
    makes.forEach(make => {
        makeSel.appendChild(new Option(make, make));
    });
}

function populateModels() {
    modelSel.innerHTML = '<option value="">Select Model</option>';
    yearSel.innerHTML = '<option value="">Select Year</option>';
    
    const selectedMake = makeSel.value;
    if (!selectedMake) return;
    
    const models = [...new Set(finalData.filter(p => p.make === selectedMake).map(p => p.model))].sort();
    models.forEach(model => {
        modelSel.appendChild(new Option(model, model));
    });
}

function populateYears() {
    yearSel.innerHTML = '<option value="">Select Year</option>';
    const make = makeSel.value;
    const model = modelSel.value;
    
    if (!make || !model) return;
    
    const years = [...new Set(finalData.filter(p => p.make === make && p.model === model).map(p => p.year))].sort();
    years.forEach(year => {
        yearSel.appendChild(new Option(year, year));
    });
}

// 渲染产品（自动加载零件号图片）
function renderProducts() {
    const make = makeSel.value;
    const model = modelSel.value;
    const year = yearSel.value;

    let filtered = finalData;
    if (make) filtered = filtered.filter(p => p.make === make);
    if (model) filtered = filtered.filter(p => p.model === model);
    if (year) filtered = filtered.filter(p => p.year === year);

    productGrid.innerHTML = "";

    if (filtered.length === 0) {
        productGrid.innerHTML = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <p>No coilover kit found</p>
                <p>Contact IDSPORTS for custom solution.</p>
            </div>`;
        return;
    }

    filtered.forEach(prod => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
            <div class="product-img-container">
                <img class="product-img" 
                     src="${prod.part}.jpg" 
                     alt="${prod.application}"
                     loading="lazy"
                     onerror="this.src='product.png'">
                <div class="product-badge">COILOVER</div>
            </div>
            <div class="product-info">
                <div class="product-title">${prod.application.substring(0, 80)}</div>
                <div class="product-desc">${prod.make} • ${prod.model} • ${prod.year}</div>
                <div class="product-part">Part No: ${prod.part}</div>
            </div>`;
        productGrid.appendChild(card);
    });
}

// 事件监听
makeSel.addEventListener("change", () => { populateModels(); renderProducts(); });
modelSel.addEventListener("change", () => { populateYears(); renderProducts(); });
yearSel.addEventListener("change", renderProducts);
searchBtn.addEventListener("click", renderProducts);

// 初始化
window.addEventListener("load", () => {
    populateMakes();
    renderProducts();
});
</script>
